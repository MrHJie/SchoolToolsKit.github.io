<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        textarea, select, input[type="date"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus, select:focus, input[type="date"]:focus, input[type="number"]:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #45a049;
        }

        .schedule-result {
            margin-top: 25px;
        }

        .schedule-result h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .schedule-result ul {
            list-style-type: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .schedule-result li {
            background-color: #f9f9f9;
            margin-bottom: 8px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .schedule-result li:nth-child(odd) {
            background-color: #f1f1f1;
        }

        .date {
            font-weight: bold;
            color: #333;
        }

        .persons {
            color: #555;
        }

        @media (max-width: 600px) {
            .schedule-result li {
                flex-direction: column;
                align-items: flex-start;
            }

            .persons {
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>值班排班系统</h1>
        <div class="form-group">
            <label for="names">输入所有人员名单（每行一个）：</label>
            <textarea id="names" placeholder="例如：
张三
李四
王五
赵六"></textarea>
        </div>

        <div class="form-group">
            <label for="startPerson">选择第一个开始值班的人员：</label>
            <select id="startPerson"></select>
        </div>

        <div class="form-group">
            <label for="startDate">选择开始排班日期：</label>
            <input type="date" id="startDate">
        </div>

        <div class="form-group">
            <label for="endDate">选择结束排班日期：</label>
            <input type="date" id="endDate">
        </div>

        <div class="form-group">
            <label for="numPerDay">每天值班人数：</label>
            <input type="number" id="numPerDay" min="1" value="2">
        </div>

        <button onclick="generateSchedule()">生成排班表</button>

        <div class="schedule-result" id="scheduleResult" style="display: none;">
            <h3>排班结果：</h3>
            <ul id="resultList"></ul>
        </div>
    </div>

    <script>
        // 更新开始值班人员下拉菜单
        function populateStartPerson() {
            let names = getNames();
            let startPersonSelect = document.getElementById('startPerson');
            startPersonSelect.innerHTML = ''; // 清空之前的选项

            names.forEach((name, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = name.trim();
                startPersonSelect.appendChild(option);
            });
        }

        // 获取人员名单并去除空白行
        function getNames() {
            return document.getElementById('names').value.trim().split('\n').map(name => name.trim()).filter(name => name !== '');
        }

        document.getElementById('names').addEventListener('input', populateStartPerson);

        // 初始化开始值班人员下拉菜单
        window.addEventListener('DOMContentLoaded', populateStartPerson);

        // 生成排班表
        function generateSchedule() {
            let names = getNames();
            let startIndex = parseInt(document.getElementById('startPerson').value);
            let startDateInput = document.getElementById('startDate').value;
            let endDateInput = document.getElementById('endDate').value;
            let numPerDay = parseInt(document.getElementById('numPerDay').value);
            let resultList = document.getElementById('resultList');
            let scheduleResult = document.getElementById('scheduleResult');

            resultList.innerHTML = ''; // 清空之前的结果
            scheduleResult.style.display = 'none'; // 隐藏结果区域

            // 输入验证
            if (!startDateInput || !endDateInput || names.length === 0 || isNaN(startIndex) || isNaN(numPerDay)) {
                alert('请填写完整信息！');
                return;
            }

            if (numPerDay < 1) {
                alert('每天值班人数至少为1！');
                return;
            }

            if (numPerDay > names.length) {
                alert('每天值班人数不能超过总人员数！');
                return;
            }

            let startDate = new Date(startDateInput);
            let endDate = new Date(endDateInput);

            if (startDate > endDate) {
                alert('开始日期不能晚于结束日期！');
                return;
            }

            let currentIndex = startIndex;
            let currentDate = new Date(startDate);

            while (currentDate <= endDate) {
                let listItem = document.createElement('li');

                // 获取当天值班人员
                let todayPersons = [];
                for (let i = 0; i < numPerDay; i++) {
                    let personIndex = (currentIndex + i) % names.length;
                    todayPersons.push(names[personIndex]);
                }

                // 创建日期和人员显示
                let dateSpan = document.createElement('span');
                dateSpan.className = 'date';
                dateSpan.textContent = currentDate.toISOString().split('T')[0];

                let personsSpan = document.createElement('span');
                personsSpan.className = 'persons';
                personsSpan.textContent = todayPersons.join('、 ');

                listItem.appendChild(dateSpan);
                listItem.appendChild(personsSpan);
                resultList.appendChild(listItem);

                // 下一天
                currentDate.setDate(currentDate.getDate() + 1);

                // 轮换到下 n 个值班人员
                currentIndex = (currentIndex + numPerDay) % names.length;
            }

            // 显示结果区域
            scheduleResult.style.display = 'block';
        }
    </script>

</body>
</html>
